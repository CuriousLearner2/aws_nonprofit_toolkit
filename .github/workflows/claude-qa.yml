name: Claude Code QA Workflow

# Triggered manually or by needs-qa label
on:
  pull_request:
    types: [labeled, opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run QA on'
        required: true

permissions:
  contents: read
  pull-requests: read
  # Limited to avoid unintended modifications
  # PR comment posting requires explicit action

env:
  PYTHON_VERSION: '3.11'

jobs:
  qa-check:
    # Run if PR has needs-qa label or manually triggered
    if: |
      contains(github.event.pull_request.labels.*.name, 'needs-qa') ||
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd aws_nonprofit_toolkit/Givebutter
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Check for Artifacts
        run: |
          cd aws_nonprofit_toolkit/Givebutter
          python scripts/ci/check_no_artifacts.py

      - name: Run Unit Tests
        id: unit-tests
        run: |
          set -o pipefail
          cd aws_nonprofit_toolkit/Givebutter
          python scripts/ci/test_gate.py --timeout 600 -- python -m pytest tests/unit/ -v --tb=short 2>&1 | tee unit-test-results.txt
          echo "result=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Integration Tests
        id: integration-tests
        run: |
          set -o pipefail
          cd aws_nonprofit_toolkit/Givebutter
          python scripts/ci/test_gate.py --timeout 300 -- python -m pytest tests/integration/ -v --tb=short 2>&1 | tee integration-test-results.txt
          echo "result=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate Test Summary
        if: always()
        run: |
          cd aws_nonprofit_toolkit/Givebutter

          echo "=== QA Test Summary ===" | tee test-summary.txt
          echo "" >> test-summary.txt

          if [ -f unit-test-results.txt ]; then
            UNIT_PASS=$(grep -c "passed" unit-test-results.txt || true)
            UNIT_FAIL=$(grep -c "failed" unit-test-results.txt || true)
            echo "**Unit Tests:** ${UNIT_PASS} passed, ${UNIT_FAIL} failed" >> test-summary.txt
          fi

          if [ -f integration-test-results.txt ]; then
            INT_PASS=$(grep -c "passed" integration-test-results.txt || true)
            INT_FAIL=$(grep -c "failed" integration-test-results.txt || true)
            echo "**Integration Tests:** ${INT_PASS} passed, ${INT_FAIL} failed" >> test-summary.txt
          fi

          echo "" >> test-summary.txt
          echo "**Status:**" >> test-summary.txt

          if [ "${{ steps.unit-tests.outputs.result }}" = "0" ] && [ "${{ steps.integration-tests.outputs.result }}" = "0" ]; then
            echo "✅ All tests passed" >> test-summary.txt
          else
            echo "❌ Some tests failed - see logs" >> test-summary.txt
          fi

          cat test-summary.txt

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-results
          path: |
            aws_nonprofit_toolkit/Givebutter/unit-test-results.txt
            aws_nonprofit_toolkit/Givebutter/integration-test-results.txt
            aws_nonprofit_toolkit/Givebutter/test-summary.txt
          retention-days: 30

      - name: Post QA Results Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';

            try {
              summary = fs.readFileSync('aws_nonprofit_toolkit/Givebutter/test-summary.txt', 'utf8');
            } catch (e) {
              summary = 'Could not read test summary';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 QA Report\n\n${summary}\n\n### Next Steps:\n- Review test failures in the Actions logs\n- Upload QA report artifacts from workflow\n- Mark as needs-qa or approved based on results`
            })

  code-quality-check:
    # Optional: Add code quality, type checking, linting
    if: |
      contains(github.event.pull_request.labels.*.name, 'needs-qa') ||
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for Forbidden Patterns
        run: |
          cd aws_nonprofit_toolkit/Givebutter

          echo "=== Scanning for forbidden patterns ==="

          # Forbidden tech check
          ! grep -r "import React" scripts/ 2>/dev/null || (echo "❌ React import found" && exit 1)

          # Forbidden operation checks (targeted to catch dangerous code, not generic words)
          # Protects against: CRM writeback, contact/household merging/deletion, direct destructive writes
          ! grep -r "def merge_\|def delete_\|writeback\|givebutter.*write\|crm.*write\|save_to_crm" scripts/uploader/app.py 2>/dev/null || (echo "❌ Forbidden operation found (merge/delete/writeback)" && exit 1)

          echo "✅ No forbidden patterns detected"

      - name: Verify No App Code Changed (Documentation Only PRs)
        run: |
          # Check if only docs changed
          if git diff main --name-only | grep -E "^aws_nonprofit_toolkit/Givebutter/(scripts|tests)/" > /dev/null; then
            echo "⚠️  App code was modified - confirm in PR description"
          else
            echo "✅ Only documentation files changed"
          fi

  e2e-smoke-test:
    # E2E smoke test: opt-in via e2e-check label only
    if: contains(github.event.pull_request.labels.*.name, 'e2e-check')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install E2E Dependencies
        run: |
          cd aws_nonprofit_toolkit/Givebutter
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio playwright
          playwright install chromium

      - name: Run E2E Smoke Test
        run: |
          cd aws_nonprofit_toolkit/Givebutter
          python -m pytest tests/e2e/test_validation_review_dom.py::test_invalid_email_updates_visible_row_status_and_issues -q --tb=short 2>&1 | tee e2e-smoke-results.txt
        continue-on-error: true

      - name: Upload E2E Smoke Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results
          path: aws_nonprofit_toolkit/Givebutter/e2e-smoke-results.txt
          retention-days: 30
