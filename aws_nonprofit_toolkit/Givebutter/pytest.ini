[pytest]
# Development default: Unit + Integration only (743 tests, ~13s)
# Use: pytest tests/unit tests/integration
# For E2E: pytest tests/e2e (requires Flask running)
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for processor
    e2e: End-to-end tests with UI
    visual: Visual regression tests (Playwright screenshots)
    form: Form and input interaction tests
    slow: Tests that take longer to run
