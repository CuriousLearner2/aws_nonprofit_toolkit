name: Claude Code Developer Agent

# Triggered by @claude mention in issue or PR comments
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number to work on'
        required: true
      task_description:
        description: 'Task description for Claude Code'
        required: true

# Minimal permissions: Claude Code Action requests elevated perms only for branch/PR operations
permissions:
  contents: read
  issues: read
  pull-requests: read
  # Note: anthropics/claude-code-action will request write permissions for:
  # - Creating/updating branches (for PR-based changes)
  # - Commenting on issues/PRs
  # See https://github.com/anthropics/claude-code-action

env:
  # ANTHROPIC_API_KEY is required - set in GitHub repo settings
  # Instructions: Settings → Secrets and variables → Actions → New repository secret
  # Name: ANTHROPIC_API_KEY
  # Value: Your Anthropic API key from https://console.anthropic.com

jobs:
  claude-dev:
    # Only trigger on @claude mention in comments
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Extract Claude Command
        id: extract
        run: |
          COMMENT="${{ github.event.comment.body }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          if [ -z "$ISSUE_NUM" ] && [ -z "$PR_NUM" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          fi

          # Extract text after @claude mention
          COMMAND=$(echo "$COMMENT" | sed 's/@claude[[:space:]]*//' | head -c 2000)

          echo "issue_or_pr=$([[ -n "$ISSUE_NUM" ]] && echo "$ISSUE_NUM" || echo "$PR_NUM")" >> $GITHUB_OUTPUT
          echo "command=$COMMAND" >> $GITHUB_OUTPUT
          echo "comment_author=${{ github.event.comment.user.login }}" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate ANTHROPIC_API_KEY Secret
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY secret is not set"
            echo "Instructions:"
            echo "1. Go to GitHub repo Settings"
            echo "2. Secrets and variables → Actions"
            echo "3. New repository secret"
            echo "4. Name: ANTHROPIC_API_KEY"
            echo "5. Value: Your Anthropic API key from https://console.anthropic.com"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY secret is configured"

      - name: Run Claude Code Developer Agent
        uses: anthropics/claude-code-action@v1
        with:
          # Required: Anthropic API key from repository secrets
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Task: Extracted from @claude comment
          task: |
            You are Claude Code, a developer assistant for the DonorTrust v1 project.

            Task from ${{ github.event.comment.user.login }}:
            ${{ steps.extract.outputs.command }}

            IMPORTANT GUARDRAILS:
            1. Do NOT modify application code unless the issue explicitly requests it
            2. Do NOT modify tests unless explicitly requested
            3. Do NOT add database or persistence layer (fixture-backed only in Phase 1)
            4. Do NOT add frontend runtime (React, Node, Vite, etc.)
            5. Do NOT add deployment automation
            6. Do NOT push directly to main branch
            7. MUST create a new branch for changes (branch name format: feature/*, docs/*, fix/*)
            8. MUST create a PR for review (do NOT auto-merge)
            9. MUST preserve Phase 0 UI and UX exactly for route migrations
            10. MUST preserve all DonorTrust guardrails (raw rows never mutated, no CRM writeback, etc.)

            WORKFLOW:
            1. Review the issue/PR context
            2. Plan changes in a comment
            3. Create a new branch (e.g., docs/add-phase1b-section)
            4. Make changes on the branch
            5. Create a PR with a descriptive title and body
            6. DO NOT merge - let humans review and decide
            7. If the issue mentions QA, add the 'needs-qa' label to the PR

            Context:
            - Issue/PR: ${{ steps.extract.outputs.issue_or_pr }}
            - Repository: ${{ github.repository }}
            - Current commit: ${{ github.sha }}

          # Output: Results posted to issue/PR comment
          output-to-comment: true

          # Safety: Timeout for long-running operations
          timeout-minutes: 25

        # Allow action to fail gracefully (don't block PR workflow)
        continue-on-error: true

      - name: Post Action Result Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const context = '${{ job.status }}' === 'success' ? '✅ Claude Code completed successfully' : '⚠️  Claude Code workflow completed (check logs for details)';

            const summary = `
            ## 🤖 Claude Code Developer Agent

            ${context}

            **Task:** ${{ steps.extract.outputs.command }}
            **Author:** @${{ steps.extract.outputs.comment_author }}

            ### Next Steps:
            1. Review the PR created by Claude Code
            2. Add label \`needs-qa\` if QA testing is needed
            3. Request code review
            4. Merge when approved

            ### Workflow Guards:
            - ✅ No automatic merges
            - ✅ No direct pushes to main
            - ✅ Branch-based PR workflow enforced
            - ✅ Human approval required for merge
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            })

